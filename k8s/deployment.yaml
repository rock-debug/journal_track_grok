apiVersion: apps/v1
kind: Deployment
metadata:
  name: journal-tracker-deployment
  labels:
    app: journal-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: journal-tracker
  template:
    metadata:
      labels:
        app: journal-tracker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z -v -w3 postgres-service 5432; do echo "Waiting for database..."; sleep 2; done;']
      containers:
      - name: journal-tracker
        image: journal-tracker:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        envFrom:
        - secretRef:
            name: journal-tracker-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
